version: "3.8"

services:
    api:
        build:
            context: .
            dockerfile: Dockerfile-api
        container_name: api
        restart: unless-stopped
        ports:
          - 5001:80 
    
    web:
        build:
            context: .  
            dockerfile: Dockerfile-web
        container_name: web
        restart: unless-stopped
        ports:
          - 5000:80

    # RAG tools service — connects to the qdrant HTTP container (docker mode).
    # VS Code starts the MCP server automatically via .vscode/mcp.json (docker run, not compose).
    # Run ingest:  docker compose --profile rag run rag-tools python ingest.py
    # Run MCP:     docker compose --profile rag run --interactive rag-tools python mcp_server.py
    rag-tools:
        build:
            context: tools/rag
            dockerfile: Dockerfile
        image: rag-tools
        depends_on:
          - qdrant
        environment:
          - RAG_CONFIG=/app/config.yaml   # use baked config — selective mounts don't include tools/rag/
          - RAG_WORKSPACE=/workspace      # still needed for Config.workspace → source_roots resolution
          - PYTHONUNBUFFERED=1
          - VECTOR_MODE=docker
          - QDRANT_URL=http://qdrant:6333
        volumes:
          # Selective mounts — only what ingest actually needs, not the whole repo.
          - ./docs:/workspace/docs                            # rw — ingest writes docs/rag/index-stats.md
          - ./.github/context:/workspace/.github/context:ro  # context files (known-issues, agent-decisions, etc.)
          - ./.rag:/workspace/.rag                           # rw — manifest.json written by ingest
          # Companion config files — resolved by load_config() relative to /app/config.yaml
          - ./tools/rag/metadata-rules.yaml:/app/metadata-rules.yaml:ro
          - ./tools/rag/queries.yaml:/app/queries.yaml:ro
        profiles:
          - rag                       # opt-in: docker compose --profile rag up

    # Qdrant HTTP server — shared by rag-tools (Python MCP) and rag-dotnet (.NET gRPC client).
    qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - "6333:6333"   # HTTP REST (also reachable from host at http://localhost:6333)
          - "6334:6334"   # gRPC (used by .NET Qdrant.Client)
        volumes:
          - qdrant_data:/qdrant/storage
        profiles:
          - rag                       # shared with rag-tools
          - rag-dotnet                # opt-in: docker compose --profile rag-dotnet up
          - rag-dotnet-sse            # SSE persistent server
          - rag-python-sse            # SSE persistent server

    # .NET RAG tools — ONNX embedder + Qdrant.Client + MCP server.
    # Requires 'qdrant' service (started via --profile rag-dotnet).
    rag-dotnet:
        build:
            context: tools/rag-dotnet
            dockerfile: Dockerfile
        image: rag-dotnet
        depends_on:
          - qdrant
        environment:
          - RAG_WORKSPACE=/workspace
          - QDRANT_URL=http://qdrant:6333
          - RAG_COLLECTION=ecommerceapp_docs_dotnet
          - RAG_CONFIG=/config.yaml
          - DOTNET_CLI_TELEMETRY_OPTOUT=1
        volumes:
          - .:/workspace:ro                              # repo root → /workspace (read-only)
          - ./.rag:/workspace/.rag                       # manifest + scratch files (read-write)
          - ./docs/rag:/workspace/docs/rag               # stats md written here (read-write)
          - ./tools/rag-dotnet/config.yaml:/config.yaml:ro  # project-specific config
        profiles:
          - rag-dotnet

    # ── SSE variants ──────────────────────────────────────────────────────────
    # Persistent HTTP servers — start once, VS Code connects via mcp.json type:sse.
    # Both services reuse the same images built by their stdio counterparts.
    #
    # Start:  docker compose --profile rag-python-sse up -d rag-python-sse
    #         docker compose --profile rag-dotnet-sse up -d rag-dotnet-sse
    # Stop:   docker compose --profile rag-python-sse down
    #
    # Note: these services ONLY run the MCP server (SSE mode).
    # Run ingest separately first using the non-SSE services.

    # Python SSE — port 3002
    rag-python-sse:
        image: rag-tools
        depends_on:
          - qdrant
        environment:
          - MCP_TRANSPORT=sse
          - MCP_PORT=3002
          - RAG_WORKSPACE=/workspace
          - VECTOR_MODE=docker
          - QDRANT_URL=http://qdrant:6333
          - PYTHONUNBUFFERED=1
        ports:
          - "3002:3002"
        volumes:
          - .:/workspace:ro
          - ./tools/rag/metadata-rules.yaml:/app/metadata-rules.yaml:ro
          - ./tools/rag/queries.yaml:/app/queries.yaml:ro
        command: ["python", "mcp_server.py"]
        profiles:
          - rag-python-sse

    # .NET SSE — port 3001
    rag-dotnet-sse:
        image: rag-dotnet
        depends_on:
          - qdrant
        environment:
          - MCP_TRANSPORT=sse
          - MCP_PORT=3001
          - RAG_WORKSPACE=/workspace
          - QDRANT_URL=http://qdrant:6333
          - RAG_COLLECTION=ecommerceapp_docs_dotnet
          - RAG_CONFIG=/config.yaml
          - DOTNET_CLI_TELEMETRY_OPTOUT=1
        ports:
          - "3001:3001"
        volumes:
          - .:/workspace:ro
          - ./tools/rag-dotnet/config.yaml:/config.yaml:ro
        profiles:
          - rag-dotnet-sse

volumes:
    qdrant_data:
