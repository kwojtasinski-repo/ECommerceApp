services:
    api:
        build:
            context: .
            dockerfile: Dockerfile-api
        container_name: api
        restart: unless-stopped
        ports:
          - 5001:80 
    
    web:
        build:
            context: .  
            dockerfile: Dockerfile-web
        container_name: web
        restart: unless-stopped
        ports:
          - 5000:80

    # RAG tools service — connects to the qdrant HTTP container (docker mode).
    # VS Code starts the MCP server automatically via .vscode/mcp.json (docker run, not compose).
    # Run ingest:  docker compose --profile rag run rag-tools python ingest.py
    # Run MCP:     docker compose --profile rag run --interactive rag-tools python mcp_server.py
    rag-tools:
        build:
            context: tools/rag
            dockerfile: Dockerfile
        image: rag-tools
        depends_on:
          - qdrant
        environment:
          - RAG_CONFIG=/app/rag-config.yaml   # use baked config — selective mounts don't include tools/rag/
          - RAG_WORKSPACE=/workspace      # still needed for Config.workspace → source_roots resolution
          - PYTHONUNBUFFERED=1
          - VECTOR_MODE=docker
          - QDRANT_URL=http://qdrant:6333
        volumes:
          # Selective mounts — only what ingest actually needs, not the whole repo.
          - ./docs:/workspace/docs                            # rw — ingest writes docs/rag/index-stats.md
          - ./.github/context:/workspace/.github/context:ro  # context files (known-issues, agent-decisions, etc.)
          - ./.rag:/workspace/.rag                           # rw — manifest.json written by ingest
          # Companion config files — resolved by load_config() relative to /app/rag-config.yaml
          - ./tools/rag/metadata-rules.yaml:/app/metadata-rules.yaml:ro
          - ./tools/rag/queries.yaml:/app/queries.yaml:ro
        profiles:
          - rag                       # opt-in: docker compose --profile rag up

    # Qdrant HTTP server — shared by rag-tools (Python MCP) and rag-dotnet (.NET gRPC client).
    qdrant:
        image: qdrant/qdrant:v1.13.6
        ports:
          - "6333:6333"   # HTTP REST (also reachable from host at http://localhost:6333)
          - "6334:6334"   # gRPC (used by .NET Qdrant.Client)
        volumes:
          - qdrant_data:/qdrant/storage
        profiles:
          - rag                       # shared with rag-tools
          - rag-dotnet                # opt-in: docker compose --profile rag-dotnet up
          - rag-dotnet-http           # HTTP persistent server
          - rag-python-http           # HTTP persistent server

    # .NET RAG tools — ONNX embedder + Qdrant.Client + MCP server.
    # Requires 'qdrant' service (started via --profile rag-dotnet).
    rag-dotnet:
        build:
            context: tools/rag-dotnet
            dockerfile: Dockerfile
        image: rag-dotnet
        depends_on:
          - qdrant
        environment:
          - RAG_WORKSPACE=/workspace
          - QDRANT_URL=http://qdrant:6333
          - RAG_COLLECTION=ecommerceapp_docs_dotnet
          - RAG_CONFIG=/rag-config.yaml
          - DOTNET_CLI_TELEMETRY_OPTOUT=1
        volumes:
          - .:/workspace:ro                              # repo root → /workspace (read-only)
          - ./.rag:/workspace/.rag                       # manifest + scratch files (read-write)
          - ./docs/rag:/workspace/docs/rag               # stats md written here (read-write)
          - ./tools/rag-dotnet/rag-config.yaml:/rag-config.yaml:ro  # project-specific config
          - ./tools/rag/metadata-rules.yaml:/metadata-rules.yaml:ro  # companion: adr_id patterns
          - ./tools/rag/queries.yaml:/queries.yaml:ro                 # companion: named queries
        profiles:
          - rag-dotnet

    # ── HTTP variants ─────────────────────────────────────────────────────────
    # Persistent HTTP servers — start once, VS Code connects via mcp.json.
    # Both services reuse the same images built by their stdio counterparts.
    #
    # Start:  docker compose --profile rag-python-http up -d rag-python-http
    #         docker compose --profile rag-dotnet-http up -d rag-dotnet-http
    # Stop:   docker compose --profile rag-python-http down
    #
    # Note: these services ONLY run the MCP server (HTTP mode).
    # Run ingest separately first using the non-HTTP services.

    # Python HTTP — port 3002 (Streamable HTTP, mcp>=1.8.0)
    rag-python-http:
        image: rag-tools
        depends_on:
          - qdrant
        environment:
          - MCP_TRANSPORT=http
          - MCP_PORT=3002
          - RAG_WORKSPACE=/workspace
          - VECTOR_MODE=docker
          - QDRANT_URL=http://qdrant:6333
          - PYTHONUNBUFFERED=1
        ports:
          - "3002:3002"
        volumes:
          - .:/workspace:ro
          - ./tools/rag/metadata-rules.yaml:/app/metadata-rules.yaml:ro
          - ./tools/rag/queries.yaml:/app/queries.yaml:ro
          - ./tools/rag/multilingual-glossary.yaml:/app/multilingual-glossary.yaml:ro  # companion: PL/DE query expansion
        command: ["python", "mcp_server.py"]
        profiles:
          - rag-python-http

    # .NET HTTP — port 3001
    rag-dotnet-http:
        image: rag-dotnet
        depends_on:
          - qdrant
        environment:
          - MCP_TRANSPORT=http
          - MCP_PORT=3001
          - RAG_WORKSPACE=/workspace
          - QDRANT_URL=http://qdrant:6333
          - RAG_COLLECTION=ecommerceapp_docs_dotnet
          - RAG_CONFIG=/rag-config.yaml
          - DOTNET_CLI_TELEMETRY_OPTOUT=1
        ports:
          - "3001:3001"
        volumes:
          - .:/workspace:ro
          - ./tools/rag-dotnet/rag-config.yaml:/rag-config.yaml:ro
          - ./tools/rag/metadata-rules.yaml:/metadata-rules.yaml:ro              # companion: adr_id patterns
          - ./tools/rag/queries.yaml:/queries.yaml:ro                             # companion: named queries
          - ./tools/rag/multilingual-glossary.yaml:/multilingual-glossary.yaml:ro # companion: PL/DE query expansion (shared with Python)
        profiles:
          - rag-dotnet-http

    # ── Context-Mode MCP sandbox (always-on) ──────────────────────────────────
    # Reads developer-tunable values from .env.context-mode (gitignored).
    # See docs/roadmap/context-mode-details.md §"Configurable parameters" for the
    # full 12-knob table. Defaults via ${VAR:-default} keep the container hardened
    # even when the env file is missing.
    context-mode:
        build:
            context: .
            dockerfile: Dockerfile-context-mode
            args:
                CONTEXT_MODE_TAG: "${CONTEXT_MODE_TAG:-v1.0.151}"
        image: ecommerceapp/context-mode:${CONTEXT_MODE_TAG:-v1.0.151}
        container_name: ecommerceapp-context-mode
        env_file:
            - path: .env.context-mode
              required: false                                  # OK if missing — ${VAR:-default} wins
        stdin_open: true
        tty: false
        restart: unless-stopped
        user: "1000:1000"                                       # non-root
        read_only: true                                         # root FS immutable
        tmpfs:
            - /tmp:rw,size=${CONTEXT_MODE_TMPFS_SIZE:-64m},mode=1777
        cap_drop: [ALL]
        security_opt:
            - no-new-privileges:true
        pids_limit: ${CONTEXT_MODE_PIDS_LIMIT:-100}
        mem_limit: ${CONTEXT_MODE_MEM_LIMIT:-1g}
        cpus: ${CONTEXT_MODE_CPUS:-2}
        ipc: none
        volumes:
            # Mount target is parametric so forks/dev overrides can rename it via
            # CONTEXT_MODE_WORKSPACE in .env.context-mode without breaking docs.
            # The same value is injected as an env var below so agents can probe it.
            - .:${CONTEXT_MODE_WORKSPACE:-/workspace}:ro        # repo — READ-ONLY (context-mode shouldn't write to source)
            - context-mode-data:/home/ctxmode/.context-mode     # SQLite session DB (writable, isolated)
            - ./docker/context-mode/empty-claude-settings.json:/home/node/.claude/settings.json:ro  # silences PreToolUse hook FAIL
        environment:
            CTX_FETCH_STRICT: "${CONTEXT_MODE_FETCH_STRICT:-1}"
            CONTEXT_MODE_EXTERNAL_MCP_NUDGE_EVERY: "${CONTEXT_MODE_NUDGE_EVERY:-50}"
            CONTEXT_MODE_DIR: "/home/ctxmode/.context-mode"
            CONTEXT_MODE_WORKSPACE: "${CONTEXT_MODE_WORKSPACE:-/workspace}"  # discoverable by agents via `ctx_execute("sh","echo $CONTEXT_MODE_WORKSPACE")`
        ports:
            - "127.0.0.1:${CONTEXT_MODE_INSIGHT_PORT:-9998}:8765"  # ctx_insight UI — localhost only
        networks:
            ctx-net:
                ipv4_address: 172.28.0.10               # static — stable target for `docker exec`
        dns:
            - 172.28.0.2                            # AdGuard (ONLY — no upstream fallback)
        # Keep the container alive as an idle host; MCP server is spawned per-session via
        # `docker exec` from .vscode/mcp.json. This avoids restarting the whole sandbox on
        # every VSCode "Start" click — only the node process gets recycled, network-monitor
        # stays loaded, FTS5 DB stays warm.
        entrypoint: ["sleep", "infinity"]
        # Lightweight liveness probe — verifies the cli bundle is loadable and FTS5 native
        # module works. Runs every 60s; failure means the image is broken, not a transient.
        healthcheck:
            test: ["CMD", "node", "-e", "require('/app/cli.bundle.mjs')"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 15s
        profiles:
            - context-mode

    # ── AdGuard Home — DNS firewall (profile: monitoring) ─────────────────────
    # Start with: docker compose --profile monitoring up -d adguard
    # UI: http://127.0.0.1:3000  (setup wizard on first visit — set STRONG password)
    adguard:
        image: adguard/adguardhome:${ADGUARD_TAG:-v0.107.50}
        container_name: ecommerceapp-adguard
        profiles: [monitoring]
        restart: unless-stopped
        ports:
            - "127.0.0.1:${ADGUARD_UI_PORT:-3000}:3000"         # web UI host-only
        volumes:
            - adguard-work:/opt/adguardhome/work
            - ./docker/adguard:/opt/adguardhome/conf             # AdGuard upgrades schema + wizard writes password hash here
        # Liveness: TCP probe against the DNS resolver port. AdGuard binds :53
        # only after config loads and filters are compiled, so this gates the
        # whole stack in one check (UI + filters + DNS). Avoids HTTP auth (403)
        # and unreliable wget exit codes on the upstream alpine image.
        healthcheck:
            test: ["CMD-SHELL", "nc -z 127.0.0.1 53 || exit 1"]
            interval: 60s
            timeout: 10s
            retries: 3
            start_period: 15s
        networks:
            ctx-net:
                ipv4_address: 172.28.0.2                # static IP — referenced by context-mode --dns
                aliases: [adguard]

volumes:
    qdrant_data:
    context-mode-data:                                          # SQLite session DB for context-mode
        name: ecommerceapp_context-mode-data                    # explicit name — created by scripts/context-mode-bootstrap.ps1 with UID 1000 ownership
        external: true
    adguard-work:                                               # AdGuard query log + cached lists

networks:
    ctx-net:
        driver: bridge
        ipam:
            config:
                - subnet: 172.28.0.0/24                          # fixed subnet — static IPs above must fall here
        # We do NOT use `internal: true` — AdGuard MUST have outbound access
        # to fetch lists and resolve upstream DNS for allowed domains.
