name: .NET CI

# Manual trigger only for now.
# When ready to enable on every push/PR, uncomment the `push` and `pull_request` blocks below.
on:
  workflow_dispatch:
  # push:
  #   branches: [main, develop]
  # pull_request:
  #   branches: [main, develop]

env:
  DOTNET_VERSION: '7.0.x'
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  CONFIGURATION: Release

jobs:
  build-and-test:
    name: Build, Test, ArchUnitNET
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ECommerceApp.sln

      - name: Build (Release, no restore)
        run: dotnet build ECommerceApp.sln --configuration ${{ env.CONFIGURATION }} --no-restore

      - name: Unit tests
        run: >
          dotnet test ECommerceApp.UnitTests/ECommerceApp.UnitTests.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --logger "trx;LogFileName=unit-tests.trx"
          --results-directory ./TestResults

      - name: Integration tests
        run: >
          dotnet test ECommerceApp.IntegrationTests/ECommerceApp.IntegrationTests.csproj
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --logger "trx;LogFileName=integration-tests.trx"
          --results-directory ./TestResults

      # ArchUnitNET architecture tests live inside ECommerceApp.UnitTests/Architecture/
      # and run as part of the unit test suite above. No separate step needed.

      - name: Publish test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: ./TestResults/*.trx
          retention-days: 14
