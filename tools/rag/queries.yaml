# queries.yaml — named queries for the ECommerceApp RAG index.
# Loaded by the RAG ingest and MCP server via rag-config.yaml → config_files.queries.
# Override per-repo without modifying rag-config.yaml or the Docker image.
#
# Format:
#   name:     unique identifier (used by eval.py and MCP tool arguments)
#   question: the natural-language query to embed and search
#   doc_kind: optional — filter results to this doc_kind only
#   adr_id:   optional — filter results to a specific ADR (4-digit zero-padded)
#   top_k:    optional — how many results to return for this query.
#             Use a higher number (10–20) for broad discovery queries where you want
#             to see many relevant chunks (e.g., "list all amendments").
#             Use a lower number (5–8) for precise questions with a single correct answer.
#             Omit to use rag-config.yaml → query.default_top_k (currently 5).

# ── ADR by kind ───────────────────────────────────────────────────────────────
