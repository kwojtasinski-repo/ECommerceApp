# RAG MVP configuration for ECommerceApp
# All paths are relative to the repository root.

source:
  # Roots to scan recursively for .md files.
  roots:
    - docs
  # Files matching any of these globs are excluded.
  exclude_globs:
    - "docs/reports/**"  # session/transient reports — not project knowledge
    - "**/.git/**"

embedder:
  # sentence-transformers model id. 768 dims, higher recall than MiniLM.
  model: "sentence-transformers/all-mpnet-base-v2"
  device: "cpu"          # cpu | cuda — cpu is fine for this corpus size
  batch_size: 32

chunker:
  # Heading-based split with size guard + overlap, breadcrumb prepended to embed_text.
  max_tokens: 800        # hard upper bound per chunk (approx tokens, model limit is 512)
  min_tokens: 40         # below this, the chunk is dropped (too generic to embed well)
  overlap_tokens: 80     # rolling overlap when a heading section is split into sub-chunks
  split_on_headings: [1, 2, 3]   # split at H1/H2/H3, keep H4+ inside chunks

vector_store:
  backend: "qdrant"
  mode: "memory"         # memory | docker
  collection: "ecommerceapp_docs"
  # When mode = docker:
  url: "http://localhost:6333"

ranking:
  # Multiplier applied AFTER similarity score (score * weight).
  # Path patterns are matched as fnmatch globs against the relative file path.
  # First match wins. Default weight if no match: 1.00.
  weights:
    - { pattern: "docs/adr/*/amendments/**",                    weight: 1.20 }
    - { pattern: "docs/adr/*/example-implementation/**",        weight: 1.10 }
    - { pattern: "docs/adr/*/[0-9]*-*.md",                      weight: 1.00 }   # main ADR file
    - { pattern: "docs/adr/*/README.md",                        weight: 0.95 }   # router (mostly links)
    - { pattern: "docs/architecture/**",                        weight: 0.90 }
    - { pattern: "docs/patterns/**",                            weight: 0.85 }
    - { pattern: "docs/reference/**",                           weight: 0.80 }
    - { pattern: "docs/roadmap/**",                             weight: 0.70 }
    - { pattern: "docs/adr/*/checklist.md",                     weight: 0.40 }
    - { pattern: "docs/adr/*/migration-plan.md",                weight: 0.30 }
    - { pattern: "docs/rag/**",                                   weight: 0.20 }   # RAG tool meta-docs, not project knowledge
  # Stub guard — files smaller than this contribute weight 0.05 (effectively buried).
  stub_byte_threshold: 400

query:
  default_top_k: 5
  fetch_k: 20            # fetch this many from Qdrant, then re-rank with weights, then truncate to top_k

# Optional future synthesis layer. Default: disabled — Copilot does the synthesis.
synthesis:
  mode: "none"           # none | local | api
  # When mode = local:
  ollama_url: "http://localhost:11434"
  ollama_model: "qwen2.5:7b"

storage:
  # Where the in-memory snapshot is dumped on `ingest.py` so query.py can reload without re-embedding.
  snapshot_path: "tools/rag/.cache/snapshot.qdrant"
  manifest_path: "tools/rag/.cache/manifest.json"
