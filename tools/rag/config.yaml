# RAG MVP configuration for ECommerceApp
# All paths are relative to the repository root.
#
# VERSION: bump this when chunker settings, model, or metadata_rules change in
# a way that requires a full re-index. Ingest scripts compare this value against
# the version stored in .rag/manifest.json and trigger --force-full automatically.
version: "1"

source:
  # Roots to scan recursively for .md files.
  roots:
    - docs
    - .github/context      # known-issues.md, agent-decisions.md, project-state.md, repo-index.md
  # Files matching any of these globs are excluded.
  exclude_globs:
    - "docs/reports/**"          # session/transient reports — not project knowledge
    - "**/.git/**"
    - ".github/context/anti-patterns-critical.context.md"  # loaded directly by @code-reviewer, not via RAG

embedder:
  # Multilingual model — 50+ languages including Polish and English, 384 dims (same schema as all-MiniLM-L6-v2).
  # Switch from all-MiniLM-L6-v2 (EN-only) to support mixed PL/EN queries against English docs.
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  dimensions: 384        # output vector size — must match collection schema; change requires full re-index
  device: "cpu"          # cpu | cuda — cpu is fine for this corpus size
  batch_size: 32

chunker:
  # Heading-based split with size guard + overlap, breadcrumb prepended to embed_text.
  max_tokens: 800        # hard upper bound per chunk (approx tokens, model limit is 512)
  min_tokens: 40         # below this, the chunk is dropped (too generic to embed well)
  overlap_tokens: 80     # rolling overlap when a heading section is split into sub-chunks
  split_on_headings: [1, 2, 3]   # split at H1/H2/H3, keep H4+ inside chunks

vector_store:
  backend: "qdrant"
  mode: "local"          # local | docker | memory
                          # local  = embedded Qdrant, no server, uses local_path (default for container)
                          # docker = Qdrant HTTP server at url (for direct host-based development)
                          # memory = in-memory only, dumps snapshot (CI / testing)
  local_path: "/data/qdrant"   # inside the rag-tools container, mounted to qdrant_data volume
  collection: "ecommerceapp_docs"
  # When mode = docker (override on host if running without container):
  url: "http://localhost:6333"

ranking:
  # Multiplier applied AFTER similarity score (score * weight).
  # Path patterns are matched as fnmatch globs against the relative file path.
  # First match wins. Default weight if no match: 1.00.
  weights:
    - { pattern: ".github/context/known-issues.md",             weight: 1.25 }   # bug-fix gate — always high priority
    - { pattern: ".github/context/agent-decisions.md",          weight: 1.20 }   # correction history — high signal
    - { pattern: ".github/context/project-state.md",            weight: 1.15 }   # BC block status — critical
    - { pattern: ".github/context/repo-index.md",               weight: 1.00 }   # full codebase map
    - { pattern: ".github/context/future-skills.md",            weight: 0.80 }   # forward-looking, lower priority
    - { pattern: "docs/adr/*/amendments/**",                    weight: 1.20 }
    - { pattern: "docs/adr/*/example-implementation/**",        weight: 1.10 }
    - { pattern: "docs/adr/*/[0-9]*-*.md",                      weight: 1.00 }   # main ADR file
    - { pattern: "docs/adr/*/README.md",                        weight: 0.95 }   # router (mostly links)
    - { pattern: "docs/architecture/**",                        weight: 0.90 }
    - { pattern: "docs/patterns/**",                            weight: 0.85 }
    - { pattern: "docs/reference/**",                           weight: 0.80 }
    - { pattern: "docs/roadmap/**",                             weight: 0.70 }
    - { pattern: "docs/adr/*/checklist.md",                     weight: 0.40 }
    - { pattern: "docs/adr/*/migration-plan.md",                weight: 0.30 }
    - { pattern: "docs/rag/**",                                   weight: 0.20 }   # RAG tool meta-docs, not project knowledge
  # Stub guard — files smaller than this contribute weight 0.05 (effectively buried).
  stub_byte_threshold: 400

query:
  default_top_k: 5
  fetch_k: 20            # fetch this many from Qdrant, then re-rank with weights, then truncate to top_k
  score_threshold: 0.30  # minimum cosine similarity to include a hit (0 = no filter)

# ── Companion config files ─────────────────────────────────────────────────────
# Paths are relative to this file's directory.
# The loader resolves each path relative to the directory that contains config.yaml.
# Override any file by changing its path here — no hardcoded paths in code.
config_files:
  metadata_rules: "metadata-rules.yaml"   # doc_kind_rules + adr_id_patterns
  queries:        "queries.yaml"          # named_queries for this repo's domain



# Optional future synthesis layer. Default: disabled — Copilot does the synthesis.
synthesis:
  mode: "none"           # none | local | api
  # When mode = local:
  ollama_url: "http://localhost:11434"
  ollama_model: "qwen2.5:7b"

storage:
  # Where the in-memory snapshot is dumped on `ingest.py` so query.py can reload without re-embedding.
  snapshot_path: "tools/rag/.cache/snapshot.qdrant"
  # Manifest tracks which files are indexed and their SHA-256 hashes for incremental ingest.
  # Lives at the repo root so it works from any repo, not tied to tools/rag/.
  # Gitignored — per-instance state, not team-shared.
  manifest_path: ".rag/manifest.json"
  # Human-readable index summary — COMMITTED to the repo.
  # Generated by ingest after every run. Gives the team visibility into index state
  # without coupling to a specific Qdrant instance.
  stats_path: "docs/rag/index-stats.md"
