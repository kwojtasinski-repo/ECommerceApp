# RAG MVP configuration for ECommerceApp
# All paths are relative to the repository root.
#
# VERSION: bump this when chunker settings, model, or metadata_rules change in
# a way that requires a full re-index. Ingest scripts compare this value against
# the version stored in .rag/manifest.json and trigger --force-full automatically.
version: "1"

source:
  # Roots to scan recursively for .md files.
  roots:
    - docs
    - .github/context      # known-issues.md, agent-decisions.md, project-state.md, repo-index.md
  # Files matching any of these globs are excluded.
  exclude_globs:
    - "docs/reports/**"          # session/transient reports — not project knowledge
    - "docs/rag/**"              # RAG tool meta-docs and test reports — not project knowledge
    - "**/.git/**"
    - ".github/context/anti-patterns-critical.context.md"  # loaded directly by @code-reviewer, not via RAG

chunker:
  # Each doc is split into chunks so that Qdrant can find the relevant paragraph,
  # not just the relevant file. Smaller chunks = more precise answers but more index entries.
  max_tokens: 512        # hard upper limit per chunk. Matches the embedder native cap
                         # (MiniLM-L12-v2 / ONNX both at 512). Values >512 are silently
                         # truncated at encode time. Eval-driven tuning to a lower value
                         # (e.g. 256/384) is a separate future slice.
  min_tokens: 40         # chunks shorter than this are dropped (too short to carry useful meaning)
  overlap_tokens: 64     # the last 64 tokens of a chunk are repeated at the start of the next.
                         # This prevents a question that spans two chunks from returning a half-answer.
  # Which Markdown heading levels trigger a chunk boundary.
  # "auto" (default) — splits at every heading level (H1–H6). Short sections that fall
  #              below min_tokens are merged into the previous chunk instead of dropped.
  #              This gives natural, heading-aligned boundaries for all docs regardless
  #              of how deeply nested they are. Recommended for most repos.
  # [1, 2, 3]  — explicit list. Only H1/H2/H3 act as boundaries; H4+ content stays inside
  #              the parent H3 chunk. Use this when you want predictable chunk shapes and
  #              know your H4+ sections are always too short to stand alone.
  #
  # Why not always use [1,2,3]?
  # H4+ sections in ADRs and reference docs (endpoint-map.md, coupon rules) can be
  # long and topic-specific. Without "auto", an H3 blob containing 12 H4 sub-sections
  # gets split at the token cap — mid-paragraph, mid-sentence. "auto" prevents that.
  split_on_headings: "auto"

vector_store:
  # The name of the Qdrant collection that holds all indexed chunks.
  # You normally never need to change this.
  collection: "ecommerceapp_docs"
  # Qdrant HTTP API URL — used when the server runs in docker mode.
  # Override at runtime with the QDRANT_URL environment variable (already set in docker-compose).
  url: "http://localhost:6333"
  # Mode (local vs docker) is set by the VECTOR_MODE environment variable — not here.
  # local  = embedded Qdrant (file on disk, used inside the rag-tools container).
  # docker = separate Qdrant server at the url above (used in docker-compose).
  # Default when no env var is set: docker.

ranking:
  # After Qdrant finds the most similar chunks, each result’s score is multiplied
  # by a weight that depends on which file the chunk came from.
  #
  # Why? Not all docs are equally useful.
  # Bug-fix files and past corrections must surface first — even if their raw
  # similarity is a little lower than a less critical doc.
  # Roadmap files answer “what’s planned”, not “how does it work right now”,
  # so they should rank lower than current-state docs for design questions.
  #
  # How it works in practice:
  #   final_score = raw_cosine_similarity × weight
  #
  # Example:
  #   known-issues.md chunk  : raw=0.80 × 1.25 = final 1.00
  #   roadmap chunk          : raw=0.82 × 0.70 = final 0.57
  #   → known-issues.md wins even though roadmap scored higher initially
  #
  # How to pick a value when adding a new pattern:
  #   1.20–1.25  "must surface no matter what"   — bug-fix gates, safety-critical docs
  #   1.05–1.15  "more authoritative than average" — amendments that override older ADR text,
  #                                                  concrete implementation examples
  #   0.90–1.00  "neutral / current state"         — main ADR text, full codebase maps
  #   0.70–0.85  "useful context, not a primary answer" — abstract architecture docs,
  #                                                        code templates, endpoint lists
  #   0.30–0.70  "low priority / future work"      — roadmaps, step-by-step migration plans
  #   0.05–0.10  "only as a last resort"            — generated stubs, empty placeholders
  #
  # First matching glob wins. Files not matched by any pattern get weight 1.00.
  weights:
    - { pattern: ".github/context/known-issues.md",             weight: 1.25 }   # bug-fix gate: must surface even with slightly lower raw score
    - { pattern: ".github/context/agent-decisions.md",          weight: 1.20 }   # past corrections: highest priority to prevent repeating mistakes
    - { pattern: ".github/context/project-state.md",            weight: 1.15 }   # blocked-BC status: critical before any BC-level work
    - { pattern: ".github/context/repo-index.md",               weight: 1.00 }   # full codebase map: neutral
    - { pattern: ".github/context/future-skills.md",            weight: 0.80 }   # forward-looking: useful but not current state
    - { pattern: "docs/adr/*/amendments/**",                    weight: 1.20 }   # amendments OVERRIDE original sections: always more current. (R4 experiment 2026-05-28: lowering to 1.10 produced ZERO parity change because Python raw cosine on amendments is consistently 0.05-0.15 higher than on canonical ADR text — see docs/reports/rag-parity-fix-diagnosis-2026-05-28.md §10. The fix belongs in retrieval ranking, not weights.)
    - { pattern: "docs/adr/*/example-implementation/**",        weight: 1.10 }   # concrete code: more actionable than abstract ADR text
    - { pattern: "docs/adr/*/[0-9]*-*.md",                      weight: 1.00 }   # main ADR file: authoritative decision
    - { pattern: "docs/adr/*/README.md",                        weight: 0.95 }   # ADR router: mostly links, rarely the answer itself
    - { pattern: "docs/architecture/**",                        weight: 0.90 }   # cross-cutting maps: useful but abstract
    - { pattern: "docs/patterns/**",                            weight: 0.85 }   # code templates: useful for implementation questions
    - { pattern: "docs/reference/**",                           weight: 0.80 }   # endpoint maps etc.: narrow scope
    - { pattern: "docs/roadmap/**",                             weight: 0.70 }   # planned work: low priority for “how does it work now”
    - { pattern: "docs/adr/*/checklist.md",                     weight: 0.40 }   # conformance checklists: indexed but rarely the primary answer
    - { pattern: "docs/adr/*/migration-plan.md",                weight: 0.30 }   # step-by-step migration: rarely what a design question needs
  # Stub guard: files smaller than this many bytes AND whose path contains the
  # substring `/example-implementation/` (anywhere — not restricted to ADRs)
  # are treated as empty placeholders and forced to weight 0.05 so they can't
  # outrank real content. Today the only folders matching that substring live
  # under `docs/adr/*/example-implementation/`, but the rule is by convention,
  # not enforced — any future `/example-implementation/` folder elsewhere in
  # the tree would also be caught. Tiny READMEs or short docs in other paths
  # keep their normal weight from the `weights[]` table above.
  # Tune UP (e.g. 800) if real placeholders are still leaking into top results.
  # Tune DOWN (e.g. 200) if genuinely terse examples are being buried.
  # (400 bytes ≈ 3 meaningful sentences — anything shorter is almost always a stub.)
  # See: tools/rag/common.py `resolve_weight` for the exact code.
  stub_byte_threshold: 400

query:
  # How many results the MCP tools return to Copilot by default.
  # 5 means "give Copilot the 5 most relevant chunks."
  # Use a higher value in queries.yaml for broad discovery queries.
  default_top_k: 5
  # How many candidates Qdrant fetches before ranking.
  # Qdrant first retrieves fetch_k results by raw similarity.
  # Then the weight multipliers (see ranking.weights above) are applied and
  # the list is trimmed to top_k. fetch_k must be ≥ top_k.
  # Higher fetch_k = the weight multipliers have more candidates to promote
  # or demote, but each query is slightly slower. 20 is a good balance.
  fetch_k: 20
  # Minimum raw similarity score (0.0–1.0) to include a result.
  # 0.30 means "if a chunk is less than 30% similar to the question, ignore it."
  # Set to 0.0 to never filter (not recommended — off-topic chunks pollute the answer).
  # Set to 0.5–0.7 for stricter filtering (fewer but more relevant results).
  score_threshold: 0.30

# ── Companion config files ─────────────────────────────────────────────────────
# Paths are relative to this file's directory.
# The loader resolves each path relative to the directory that contains rag-config.yaml.
# Override any file by changing its path here — no hardcoded paths in code.
config_files:
  metadata_rules:        "metadata-rules.yaml"          # doc_kind_rules + adr_id_patterns
  queries:               "queries.yaml"                 # named_queries for this repo's domain
  multilingual_glossary: "multilingual-glossary.yaml"  # query-time expansion: Polish / German → English

storage:
  manifest_path: ".rag/manifest.json"
  stats_path: ".rag/index-stats.md"

