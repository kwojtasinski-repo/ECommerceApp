# RAG configuration for the .NET MCP server — ECommerceApp
# Separate from tools/rag/config.yaml so weights and settings can be tuned
# independently for experimentation without touching the Python server config.
#
# Re-index note: a full re-index is needed when chunker settings, model, or
# ranking weights change in a way that affects the vector space or chunk boundaries.

source:
  # Same roots as Python config — both index the same docs.
  roots:
    - docs
    - .github/context
  exclude_globs:
    - "docs/reports/**"
    - "docs/rag/**"              # RAG tool meta-docs and test reports — not project knowledge
    - "**/.git/**"
    - ".github/context/anti-patterns-critical.context.md"

embedder:
  # Informational only — .NET loads the ONNX binary from the directory set by RAG_MODEL_DIR.
  # Dimensions and device are inferred from the ONNX model at runtime; they are not used by code.
  # This is the only field you might need to change — if you switch models, run ingest with
  # --force-full afterwards (old vectors are incompatible with the new model).
  model: "sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2"
  # batch_size is a server performance setting with a safe default (32). Not listed here.

chunker:
  # Each doc is split into chunks so that Qdrant can find the relevant paragraph,
  # not just the relevant file. Smaller chunks = more precise answers but more index entries.
  max_tokens: 800        # hard upper limit per chunk (the model processes up to 512 tokens;
                         # chunks over 512 are truncated at encode time, so keep this close to 512)
  min_tokens: 40         # chunks shorter than this are dropped (too short to carry useful meaning)
  overlap_tokens: 80     # the last 80 tokens of a chunk are repeated at the start of the next.
                         # This prevents a question that spans two chunks from returning a half-answer.
  # Which Markdown heading levels trigger a chunk boundary.
  # "auto" (default) — splits at every heading level (H1–H6). Short sections that fall
  #              below min_tokens are merged into the previous chunk instead of dropped.
  # [1, 2, 3]  — explicit list. Only H1/H2/H3 act as boundaries; H4+ stays inside H3.
  split_on_headings: "auto"

vector_store:
  # .NET always connects to Qdrant via HTTP gRPC — no embedded or memory mode.
  # Separate collection so Python and .NET embeddings never mix (different tokenizers
  # produce incompatible vector spaces — cross-collection queries would degrade quality).
  collection: "ecommerceapp_docs_dotnet"
  url: "http://localhost:6333"

ranking:
  # After Qdrant finds the most similar chunks, each result’s score is multiplied
  # by a weight that depends on which file the chunk came from.
  # final_score = raw_cosine_similarity × weight
  # Example: known-issues.md (raw=0.80 × 1.25 = 1.00) beats roadmap (raw=0.82 × 0.70 = 0.57).
  #
  # How to pick a value when adding a new pattern:
  #   1.20–1.25  "must surface no matter what"       — bug-fix gates, safety-critical docs
  #   1.05–1.15  "more authoritative than average"    — amendments, concrete code examples
  #   0.90–1.00  "neutral / current state"            — main ADR text, codebase maps
  #   0.70–0.85  "useful context, not primary answer" — templates, abstract docs
  #   0.30–0.70  "low priority / future work"         — roadmaps, migration plans
  #   0.05–0.10  "only as a last resort"              — empty stubs, placeholders
  #
  # Weights are tunable here independently of the Python config — only the .NET collection is affected.
  # First matching glob wins. Files not matched by any pattern get weight 1.00.
  weights:
    - { pattern: ".github/context/known-issues.md",             weight: 1.25 }
    - { pattern: ".github/context/agent-decisions.md",          weight: 1.20 }
    - { pattern: ".github/context/project-state.md",            weight: 1.15 }
    - { pattern: ".github/context/repo-index.md",               weight: 1.00 }
    - { pattern: ".github/context/future-skills.md",            weight: 0.80 }
    - { pattern: "docs/adr/*/amendments/**",                    weight: 1.20 }
    - { pattern: "docs/adr/*/example-implementation/**",        weight: 1.10 }
    - { pattern: "docs/adr/*/[0-9]*-*.md",                      weight: 1.00 }
    - { pattern: "docs/adr/*/README.md",                        weight: 0.95 }
    - { pattern: "docs/architecture/**",                        weight: 0.90 }
    - { pattern: "docs/patterns/**",                            weight: 0.85 }
    - { pattern: "docs/reference/**",                           weight: 0.80 }
    - { pattern: "docs/roadmap/**",                             weight: 0.70 }
    - { pattern: "docs/adr/*/checklist.md",                     weight: 0.40 }
    - { pattern: "docs/adr/*/migration-plan.md",                weight: 0.30 }
  stub_byte_threshold: 400

query:
  # How many results the MCP tools return to Copilot by default.
  # 5 means "give Copilot the 5 most relevant chunks."
  default_top_k: 5
  # How many candidates Qdrant fetches before ranking.
  # Qdrant retrieves fetch_k results by raw similarity, then weights are applied,
  # then the list is trimmed to top_k. fetch_k must be ≥ top_k.
  fetch_k: 20
  # Minimum raw similarity (0.0–1.0) to include a result.
  # 0.30 = ignore chunks less than 30% similar to the question.
  score_threshold: 0.30

# ── Companion config files ─────────────────────────────────────────────────────
# Relative to this file's directory (tools/rag-dotnet/).
# Metadata rules and named queries are shared with the Python config — same repo knowledge.
config_files:
  metadata_rules:        "metadata-rules.yaml"
  queries:               "queries.yaml"
  multilingual_glossary: "multilingual-glossary.yaml"  # query-time expansion: Polish / German → English

storage:
  # Used by the ingest pipeline only — the MCP server (stdio or SSE) does not read this section.
  manifest_path: ".rag/manifest-dotnet.json"   # separate manifest — .NET per-instance state
  stats_path: "docs/rag/index-stats-dotnet.md"
